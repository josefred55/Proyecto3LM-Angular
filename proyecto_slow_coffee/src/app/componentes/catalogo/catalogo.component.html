<app-hero
  titulo="Nuestra colección"
  subtitulo="30 variedades seleccionadas con cuidado, cada una con su historia y su sabor único."
  textoBoton="100% Comercio Justo"
  botonUrl="/catalogo"
  imgUrl="../img/catalogoHero.jpg"
/>

<div class="bg-light py-4">
  <div class="container">
    <div class="d-flex justify-content-center align-items-center flex-wrap gap-4 gap-md-5">

      <div class="d-flex align-items-center gap-3">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-terracotta" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span class="fw-semibold" class="trust-label fw-semibold">Comercio Justo<em class="fw-light d-block">Certificado</em></span>
      </div>

      <div class="vr opacity-25 d-none d-md-block"></div>

      <div class="d-flex align-items-center gap-3">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-terracotta" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <span class="fw-semibold" class="trust-label fw-semibold">Origen<em class="fw-light d-block">Trazable</em></span>
      </div>

      <div class="vr opacity-25 d-none d-md-block"></div>

      <div class="d-flex align-items-center gap-3">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-terracotta" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2" ry="2"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
        <span class="fw-semibold" class="trust-label fw-semibold">Envío<em class="fw-light d-block">En 48h</em></span>
      </div>

    </div>
  </div>
</div>

<!-- GRID + FILTROS -->
<div class="container py-4 my-5" id="catalogo">
  <div class="row">
    <aside class="col-lg-3 my-4">
      <div class="bg-white rounded-3 p-4 shadow-sm sticky-top" class="sidebar-sticky">

        <div class="mb-4">
          <h5 class="d-flex align-items-center gap-2 mb-3 fw-semibold">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Buscar
          </h5>
          <input type="text" class="form-control" placeholder="Buscar café…" id="search-input">
        </div>

        <hr class="my-4">

        <div class="mb-4">
          <h5 class="d-flex align-items-center gap-2 mb-3 fw-semibold">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            Origen
          </h5>
          <div class="form-check mb-2"><input class="form-check-input filter-cb" type="checkbox" value="Etiopía" id="check-etiopia"><label class="form-check-label" for="check-etiopia">🇪🇹 Etiopía</label></div>
          <div class="form-check mb-2"><input class="form-check-input filter-cb" type="checkbox" value="Colombia" id="check-colombia"><label class="form-check-label" for="check-colombia">🇨🇴 Colombia</label></div>
          <div class="form-check mb-2"><input class="form-check-input filter-cb" type="checkbox" value="Brasil" id="check-brasil"><label class="form-check-label" for="check-brasil">🇧🇷 Brasil</label></div>
          <div class="form-check mb-2"><input class="form-check-input filter-cb" type="checkbox" value="Kenya" id="check-kenya"><label class="form-check-label" for="check-kenya">🇰🇪 Kenya</label></div>
        </div>

        <hr class="my-4">

        <div class="mb-4">
          <h5 class="d-flex align-items-center gap-2 mb-3 fw-semibold">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            Calidad
          </h5>
          <div class="form-check mb-2">
            <input class="form-check-input filter-cb-badge" type="checkbox" value="Premium" id="check-premium">
            <label class="form-check-label" for="check-premium">
              <span class="badge-premium"><svg class="text-light" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="text-light fw-semibold badge-label">Premium</span></span>
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input filter-cb-badge" type="checkbox" value="Comercio Justo" id="check-justo">
            <label class="form-check-label" for="check-justo">
              <span class="badge-justo"><svg class="text-light" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="text-light fw-semibold badge-label">Comercio Justo</span></span>
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input filter-cb-badge" type="checkbox" value="Orgánico" id="check-organico">
            <label class="form-check-label" for="check-organico">
              <span class="badge-organico"><svg class="text-light" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span class="text-light fw-semibold badge-label">Orgánico</span></span>
            </label>
          </div>
        </div>

        <button class="btn-hero w-100 text-white fw-semibold" class="btn-apply" id="apply-filters">Aplicar filtros</button>
      </div>
    </aside>

    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded-3">
            <span class="text-muted fw-medium" id="results-count">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-1"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
              Mostrando <strong>7</strong> de <strong>7</strong> productos
            </span>
        <select class="form-select form-select-sm" class="select-sort" id="sort-select">
          <option value="relevance">Ordenar por: Relevancia</option>
          <option value="price-asc">Precio: Menor a Mayor</option>
          <option value="price-desc">Precio: Mayor a Menor</option>
        </select>
      </div>
      <div id="product-grid" class="row g-4"></div>
    </div>
  </div>
</div>

<div class="container my-5">
  @if (producto) {
    <div class="card shadow-lg border-0 overflow-hidden">
      <div class="row g-0">
        <div class="col-md-6">
          <img [src]="producto.img" class="img-fluid w-100 h-100" [alt]="producto.name" style="object-fit: cover; min-height: 400px;">
        </div>
        <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
          <span class="badge bg-warning text-dark mb-2 w-fit" style="width: fit-content;">{{ producto.badge }}</span>
          <h1 class="display-5 fw-bold mb-3">{{ producto.name }}</h1>
          <h2 class="text-success mb-4">{{ producto.price }} €</h2>

          <div class="mb-4">
            <p><strong>Origen:</strong> {{ producto.origin }}</p>
            <p><strong>Proceso:</strong> {{ producto.process }}</p>
            <p class="text-muted italic">"{{ producto.note }}"</p>
          </div>

          <div class="d-grid gap-3 d-md-flex">
            <button (click)="agregarAlCarrito()" class="btn btn-primary btn-lg px-4">Añadir al carrito</button>
            <a routerLink="/catalogo" class="btn btn-outline-secondary btn-lg px-4">Volver al catálogo</a>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="alert alert-info text-center py-5">
      <h3>Buscando el mejor café para ti...</h3>
      <a routerLink="/catalogo" class="btn btn-link">Volver al catálogo</a>
    </div>
  }
</div>
